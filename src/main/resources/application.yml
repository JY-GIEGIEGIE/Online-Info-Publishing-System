server:
  port: 8080
  servlet:
    context-path: /api/publish

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stock_publish?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

account-system:
  auth-url: http://account-system/api/v1/auth/certificate-validate

central-trade:
  stock-list-url: http://central-trade/api/v1/stock/list
  transaction-url: http://central-trade/api/v1/transaction/recent
